<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen">
    <header class="bg-slate-500 sticky top-0 left-0 w-full z-50">
        <div class="flex-col max-w-5xl mx-auto px-6 py-4 text-xl font-bold md:flex-row justify-between">
            <h1 class="text-3xl">YAMA</h1>
            <nav class="flex gap-4">
                <a href="#" class="hover:text-slate-300 transition">Home</a>
                <a href="#" class="hover:text-slate-300 transition">Lucky</a>
                <a href="#" class="hover:text-slate-300 transition">Shopping</a>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src="./images\cre.webp" alt="クリーナー" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">クリーナー</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥1,9800</p>
            </div>

            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src="./images\dra.jpg" alt="ドラム" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">ドラム洗濯機</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥29,800</p>
            </div>

            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src="./images\fri.avif" alt="冷蔵庫" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">冷蔵庫</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥49,800</p>
            </div>

            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src=".\images\ket.jpg" alt="ケトル" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">ケトル</h2>
                <p class="text-2xl text-center text-orange-400 pb-2 font-mono">￥6,000</p>
            </div>

            <div class="bg-slate-300    rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src="./images\shopping.webp" alt="電子レンジ" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">電子レンジ</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥1,9800</p>
            </div>

            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src="./images\jar.webp" alt="炊飯器" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">炊飯器</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥2,9800</p>
            </div>
            
            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src=".\images\blow.jpg" alt="ドライヤー" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">ドライヤー</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥2,9800</p>
            </div>

            <div class="bg-slate-300 rounded-lg shadow-xl hover:scale-105 transition w-[70%] mx-auto">
                <img src=".\images\clo.jpg" alt="時計" class="w-full">
                <h2 class="text-3xl font-bold font-serif text-center px-4 py-2">時計</h2>
                <p class="text-2xl text-center pb-2 font-mono">￥1,980</p>
            </div>
        </div>
    </main>
</body>
</html>
